name: Daily RFP Email

on:
  workflow_dispatch:
  schedule:
    # Runs at 10 AM Central.
    # 15 UTC = 10 AM CDT, 16 UTC = 10 AM CST.
    - cron: "0 15,16 * * *"

jobs:
  daily-rfp-email:
    runs-on: ubuntu-latest

    env:
      APP_NAME: RFP GenAI
      ENV: github-actions
      LOG_LEVEL: INFO
      POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
      MONGO_URI: mongodb://localhost:27017
      MONGO_DB_NAME: rfp_genai
      REDIS_URL: redis://localhost:6379/0
      GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Central time
        id: timecheck
        run: |
          HOUR=$(TZ=America/Chicago date +%H)
          if [ "$HOUR" = "10" ]; then
            echo "run_job=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_job=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create database tables
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m app.init_db

      - name: Run daily ingestion
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m app.ingestion.run_daily

      - name: Send daily email
        if: steps.timecheck.outputs.run_job == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m app.ingestion.send_daily_email
